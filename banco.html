<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Bancario - Irusaga</title>
    <!-- Estilos de Flatpickr para el calendario -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --green-excel: #008001;
            --yellow-excel: #FFFF00;
            --cyan-excel: #00FFFF;
            --gray-row: #D9D9D9;
            --red-text: #FF0000;
            --dark-blue: #00008B;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .corr-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border: 2px solid black;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Estilos Nueva Sección Mensual */
        .monthly-summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background-color: #f0f0f0;
            border-bottom: 2px solid black;
        }
        
        .monthly-cell {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
        }
        .monthly-header { background-color: var(--dark-blue); color: white; }
        .monthly-value { background-color: white; color: var(--red-text); height: 25px; display: flex; align-items: center; justify-content: center;}

        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
        }

        .header-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }

        .cell {
            border: 1px solid black;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 13px;
            height: 30px;
            display: flex;
            align-items: center;
        }

        .bg-green { background-color: var(--green-excel); color: white; }
        .bg-yellow { background-color: var(--yellow-excel); color: black; }
        .bg-cyan { background-color: var(--cyan-excel); color: black; }
        .bg-black { background-color: black; color: white; justify-content: center; }
        .text-red { color: var(--red-text) !important; }

        input {
            border: none;
            background: transparent;
            width: 100%;
            font-weight: bold;
            font-size: 13px;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background-color: var(--green-excel);
            color: white;
            border: 1px solid black;
            padding: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            border: 1px solid black;
            background-color: var(--gray-row);
            padding: 0;
            height: 35px;
        }

        select {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-weight: bold;
            padding: 0 5px;
            cursor: pointer;
        }

        .input-valor {
            padding-left: 10px;
            color: var(--red-text);
            width: 90%;
            height: 100%;
        }

        .td-saldo {
            text-align: right;
            padding-right: 10px;
            color: var(--red-text);
            font-weight: bold;
            font-size: 14px;
        }

        .btn-borrar-corr {
            background: black;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
            height: 100%;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
        }

        /* ESTILO PARA EL PUNTITO VERDE EN EL CALENDARIO */
        .has-data-dot {
            position: relative;
        }
        .has-data-dot::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background-color: var(--green-excel);
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="corr-container">
    <!-- SECCIÓN: RESUMEN MENSUAL -->
    <div class="monthly-summary">
        <div class="monthly-cell monthly-header">ENTRADA (Mes)</div>
        <div class="monthly-cell monthly-header">SALIDA (Mes)</div>
        <div class="monthly-cell monthly-header">TRX DEPOSITO</div>
        <div class="monthly-cell monthly-header">TRX RETIRO</div>
        <div class="monthly-cell monthly-header">TOTAL COMISIÓN</div>
        
        <div class="monthly-cell monthly-value" id="m-entrada">$ 0</div>
        <div class="monthly-cell monthly-value" id="m-salida">$ 0</div>
        <div class="monthly-cell monthly-value" id="m-trx-dep">0</div>
        <div class="monthly-cell monthly-value" id="m-trx-ret">0</div>
        <div class="monthly-cell monthly-value" id="m-total-comision">$ 0</div>
    </div>

    <div class="sticky-top">
        <div class="header-grid">
            <div class="cell bg-green">Saldo Inicio</div>
            <div class="cell bg-yellow text-red">$ <input type="text" id="saldo-inicio" value="0" oninput="formatAndCalc(this)"></div>
            <div class="cell"><button class="btn-borrar-corr" onclick="resetCorresponsal()">Borrar Día</button></div>
            <div class="cell bg-black">Transacciones</div>
            <div class="cell bg-yellow" style="justify-content: center;" id="total-trans">0</div>

            <div class="cell bg-green">Saldo</div>
            <div class="cell bg-yellow text-red">$ <span id="resumen-saldo">0</span></div>
            <div class="cell bg-cyan">Compensaciones</div>
            <div class="cell bg-yellow">Deposito</div>
            <div class="cell bg-yellow text-red">$ <span id="resumen-deposito">0</span></div>

            <div class="cell bg-green text-red" style="font-size: 11px;">Cupo Disponible</div>
            <div class="cell bg-yellow text-red">$ <input type="text" id="cupo" value="0" readonly></div>
            <!-- Compensación 1 -->
            <div class="cell bg-yellow text-red">$ <input type="text" id="comp-1" value="0" oninput="formatAndCalc(this)"></div>
            <div class="cell bg-yellow">Retiro</div>
            <div class="cell bg-yellow text-red">$ <span id="resumen-retiro">0</span></div>

            <div class="cell bg-green">Saldo Efectivo</div>
            <div class="cell bg-yellow text-red">$ <span id="resumen-efectivo">0</span></div>
            <!-- Compensación 2 -->
            <div class="cell bg-yellow text-red">$ <input type="text" id="comp-2" value="0" oninput="formatAndCalc(this)"></div>
            <div class="cell bg-yellow">Fecha</div>
            <div class="cell bg-yellow"><input type="text" id="corr-fecha" placeholder="Seleccione fecha" readonly></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">Explicación (Tipo)</th>
                    <th style="width: 25%;">Valor</th>
                    <th style="width: 40%;">Saldo en Línea</th>
                </tr>
            </thead>
        </table>
    </div>

    <table>
        <tbody id="filas-corresponsal"></tbody>
    </table>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
<!-- Scripts de Flatpickr -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbGwL0wsMBsHfaNUoPlceWWtp0tKgt2m8",
        authDomain: "ahorrobancofacturacion.firebaseapp.com",
        databaseURL: "https://ahorrobancofacturacion-default-rtdb.firebaseio.com",
        projectId: "ahorrobancofacturacion",
        storageBucket: "ahorrobancofacturacion.firebasestorage.app",
        messagingSenderId: "1056148162736",
        appId: "1:1056148162736:web:939aa574f76d22fea11375"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tablaCorr = document.getElementById('filas-corresponsal');
    const inputFecha = document.getElementById('corr-fecha');
    const CUPO_BASE = 5000000;
    
    let fp; // Instancia de Flatpickr
    let fechasConDatos = []; // Array para guardar qué fechas tienen datos en Firebase

    window.onload = function() {
        cargarFechasConDatos();
    };

    // Función para obtener todas las fechas que tienen registros
    function cargarFechasConDatos() {
        db.ref('banco').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                fechasConDatos = Object.keys(data);
            } else {
                fechasConDatos = [];
            }
            initCalendar(); // Iniciar o refrescar calendario
        });
    }

    function initCalendar() {
        const today = new Date().toISOString().split('T')[0];
        
        // Si ya existe la instancia, solo la refrescamos, si no, la creamos
        if (fp) {
            fp.redraw();
            return;
        }

        fp = flatpickr("#corr-fecha", {
            locale: "es",
            defaultValue: today,
            defaultDate: today,
            dateFormat: "Y-m-d",
            onDayCreate: function(dObj, dStr, fp, dayElem) {
                // Convertir la fecha del elemento del calendario a formato YYYY-MM-DD
                const date = dayElem.dateObj;
                const dateStr = date.getFullYear() + "-" + 
                                String(date.getMonth() + 1).padStart(2, '0') + "-" + 
                                String(date.getDate()).padStart(2, '0');
                
                // Si la fecha está en nuestra lista de Firebase, añadir clase del puntito
                if (fechasConDatos.includes(dateStr)) {
                    dayElem.classList.add("has-data-dot");
                }
            },
            onChange: function(selectedDates, dateStr) {
                handleDateChange();
            }
        });
        
        initCorresponsal();
    }

    function handleDateChange() {
        initCorresponsal();
    }

    function buscarUltimoSaldoFinal(fechaActualStr) {
        let fecha = new Date(fechaActualStr + 'T12:00:00');
        for (let i = 1; i <= 30; i++) {
            fecha.setDate(fecha.getDate() - 1);
            let checkStr = fecha.toISOString().split('T')[0];
            let data = localStorage.getItem('corresponsalData_' + checkStr);
            if (data) {
                let parsed = JSON.parse(data);
                let saldoCierre = parseMoney(parsed.saldoInicio);
                let c1 = parseMoney(parsed.comp1);
                let c2 = parseMoney(parsed.comp2);
                if (parsed.filas) {
                    parsed.filas.forEach(f => {
                        let v = parseMoney(f.valor);
                        if (f.tipo === "Retiro") saldoCierre -= v;
                        if (f.tipo === "Deposito") saldoCierre += v;
                    });
                }
                return saldoCierre - (c1 + c2);
            }
        }
        return 0;
    }

    function initCorresponsal() {
        tablaCorr.innerHTML = '';
        const fecha = inputFecha.value;
        if(!fecha) return;

        db.ref('banco/' + fecha).once('value', (snapshot) => {
            const cloudData = snapshot.val();
            if(cloudData) {
                localStorage.setItem('corresponsalData_' + fecha, JSON.stringify(cloudData));
            }
            
            const savedData = JSON.parse(localStorage.getItem('corresponsalData_' + fecha));
            if (savedData) {
                document.getElementById('saldo-inicio').value = savedData.saldoInicio || "0";
                document.getElementById('comp-1').value = savedData.comp1 || "0";
                document.getElementById('comp-2').value = savedData.comp2 || "0";
                if (savedData.filas && savedData.filas.length > 0) {
                    savedData.filas.forEach(f => { crearFilaCorr(f.tipo, f.valor); });
                }
            } else {
                const saldoArrastrado = buscarUltimoSaldoFinal(fecha);
                document.getElementById('saldo-inicio').value = saldoArrastrado.toLocaleString('es-CO');
                document.getElementById('comp-1').value = "0";
                document.getElementById('comp-2').value = "0";
            }

            crearFilaCorr(); 
            calcularCorr();
            calcularResumenMensual();
        });
    }

    function crearFilaCorr(tipo = "", valor = "") {
        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="width: 35%;">
                <select class="select-exp" onchange="handleRowChange(this)">
                    <option value="" ${tipo === "" ? "selected" : ""}>-- Seleccione --</option>
                    <option value="Retiro" ${tipo === "Retiro" ? "selected" : ""}>Retiro</option>
                    <option value="Deposito" ${tipo === "Deposito" ? "selected" : ""}>Deposito</option>
                </select>
            </td>
            <td style="width: 25%;"><input type="text" class="input-valor" oninput="handleRowChange(this)" placeholder="0" value="${valor}"></td>
            <td style="width: 40%;" class="td-saldo">$ <span>0</span></td>
        `;
        tablaCorr.appendChild(tr);
    }

    function handleRowChange(element) {
        if (element.classList.contains('input-valor')) {
            let val = element.value.replace(/\D/g, "");
            element.value = val === "" ? "" : Number(val).toLocaleString('es-CO');
        }
        const filaActual = element.closest('tr');
        if (!filaActual.nextElementSibling) {
            const tipo = filaActual.querySelector('.select-exp').value;
            const valor = filaActual.querySelector('.input-valor').value;
            if (tipo !== "" || valor !== "") crearFilaCorr();
        }
        calcularCorr();
    }

    function formatAndCalc(input) {
        let val = input.value.replace(/\D/g, "");
        input.value = val === "" ? "0" : Number(val).toLocaleString('es-CO');
        calcularCorr();
    }

    function parseMoney(str) {
        if (!str || str === "-") return 0;
        return parseFloat(str.toString().replace(/\./g, '').replace(/,/g, '')) || 0;
    }

    function calcularCorr() {
        const saldoInicioBase = parseMoney(document.getElementById('saldo-inicio').value);
        const comp1 = parseMoney(document.getElementById('comp-1').value);
        const comp2 = parseMoney(document.getElementById('comp-2').value);
        const totalCompensacion = comp1 + comp2;

        let currentSaldoAcumulado = saldoInicioBase;
        let sumaRetiros = 0;
        let sumaDepositos = 0;
        let contadorTrans = 0;

        const filas = Array.from(tablaCorr.querySelectorAll('tr'));
        
        filas.forEach((fila, index) => {
            const tipo = fila.querySelector('.select-exp').value;
            const valorInput = fila.querySelector('.input-valor').value;
            const valorNum = parseMoney(valorInput);
            const displaySaldoFila = fila.querySelector('.td-saldo span');

            if (tipo && valorNum > 0) {
                contadorTrans++;
                if (tipo === "Retiro") {
                    currentSaldoAcumulado -= valorNum;
                    sumaRetiros += valorNum;
                } else if (tipo === "Deposito") {
                    currentSaldoAcumulado += valorNum;
                    sumaDepositos += valorNum;
                }
            }

            let saldoFila = currentSaldoAcumulado;
            if (index === filas.length - 1) {
                saldoFila = currentSaldoAcumulado - totalCompensacion;
            }
            displaySaldoFila.innerText = saldoFila.toLocaleString('es-CO');
        });

        const saldoEfectivoFinal = currentSaldoAcumulado - totalCompensacion;

        document.getElementById('resumen-saldo').innerText = saldoInicioBase.toLocaleString('es-CO');
        document.getElementById('resumen-efectivo').innerText = saldoEfectivoFinal.toLocaleString('es-CO');
        document.getElementById('resumen-retiro').innerText = sumaRetiros.toLocaleString('es-CO');
        document.getElementById('resumen-deposito').innerText = sumaDepositos.toLocaleString('es-CO');
        document.getElementById('total-trans').innerText = contadorTrans;
        
        const cupoCalc = CUPO_BASE - saldoEfectivoFinal;
        document.getElementById('cupo').value = cupoCalc.toLocaleString('es-CO');

        saveData();
    }

    function calcularResumenMensual() {
        const fechaActual = inputFecha.value; 
        if(!fechaActual) return;
        const mesActual = fechaActual.substring(0, 7);

        db.ref('banco').once('value', (snapshot) => {
            const todosLosDias = snapshot.val();
            
            let entradaMes = 0;
            let salidaMes = 0;
            let trxDepMes = 0;
            let trxRetMes = 0;
            let comisionTotalMes = 0;

            if (todosLosDias) {
                for (let fechaKey in todosLosDias) {
                    if (fechaKey.startsWith(mesActual)) {
                        const diaData = todosLosDias[fechaKey];
                        if (diaData.filas) {
                            diaData.filas.forEach(f => {
                                const valor = parseMoney(f.valor);
                                const tipo = f.tipo;

                                if (tipo === "Deposito") {
                                    trxDepMes++;
                                    if (valor >= 80000 && valor <= 800000) entradaMes += valor;
                                    if (valor <= 80000) comisionTotalMes += 160;
                                    else if (valor > 80000 && valor <= 800000) comisionTotalMes += (valor * 0.0020);
                                    else if (valor > 800000) comisionTotalMes += 1600;
                                } 
                                else if (tipo === "Retiro") {
                                    trxRetMes++;
                                    if (valor >= 80000 && valor <= 800000) salidaMes += valor;
                                    if (valor <= 80000) comisionTotalMes += 80;
                                    else if (valor > 80000 && valor <= 800000) comisionTotalMes += (valor * 0.0010);
                                    else if (valor > 800000) comisionTotalMes += 800;
                                }
                            });
                        }
                    }
                }
            }

            document.getElementById('m-entrada').innerText = "$ " + entradaMes.toLocaleString('es-CO');
            document.getElementById('m-salida').innerText = "$ " + salidaMes.toLocaleString('es-CO');
            document.getElementById('m-trx-dep').innerText = trxDepMes;
            document.getElementById('m-trx-ret').innerText = trxRetMes;
            document.getElementById('m-total-comision').innerText = "$ " + Math.round(comisionTotalMes).toLocaleString('es-CO');
        });
    }

    function saveData() {
        const fecha = inputFecha.value;
        if (!fecha) return;
        const filas = [];
        tablaCorr.querySelectorAll('tr').forEach(fila => {
            const tipo = fila.querySelector('.select-exp').value;
            const valor = fila.querySelector('.input-valor').value;
            if (tipo !== "" || valor !== "") {
                filas.push({ tipo, valor });
            }
        });

        // Solo guardamos si hay datos reales
        if (filas.length === 0 && parseMoney(document.getElementById('saldo-inicio').value) === 0) return;

        const data = {
            saldoInicio: document.getElementById('saldo-inicio').value,
            comp1: document.getElementById('comp-1').value,
            comp2: document.getElementById('comp-2').value,
            filas: filas
        };
        localStorage.setItem('corresponsalData_' + fecha, JSON.stringify(data));
        db.ref('banco/' + fecha).set(data).then(() => {
            calcularResumenMensual();
        });
    }

    function resetCorresponsal() {
        const fecha = inputFecha.value;
        if(confirm(`¿Estás seguro de que deseas borrar los datos del día ${fecha}?`)) {
            localStorage.removeItem('corresponsalData_' + fecha);
            db.ref('banco/' + fecha).remove().then(() => {
                initCorresponsal();
            });
        }
    }
</script>
</body>
</html>
